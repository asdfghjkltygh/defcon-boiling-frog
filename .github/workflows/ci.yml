name: CI
on: [push, pull_request]
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run attack demo and verify completion
        timeout-minutes: 10
        run: |
          python boiling_frog_exploit.py --attack --fast | tee /tmp/demo.out
          grep -q "EXPLOIT ASSESSMENT COMPLETE" /tmp/demo.out
          grep -q "boundary is a minefield" /tmp/demo.out
